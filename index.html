<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Génie Électrique</title>
  <style>
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: rgba(255,255,255,.08);
      --a: #3b82f6; --a-dim: rgba(59,130,246,.1); --a-border: rgba(59,130,246,.3);
      --t1: #e2e8f0; --t2: #64748b; --t3: #334155;
      --green: #22c55e; --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--t1); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: var(--a); border-radius: 3px; }

    .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .header .logo { font-size: 24px; }
    .header h1 { font-size: 18px; font-weight: 800; }
    .header .badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; background: var(--a-dim); border: 1px solid var(--a-border); color: var(--a); padding: 3px 10px; border-radius: 20px; }

    .shell { display: grid; grid-template-columns: 420px 1fr; gap: 20px; padding: 24px; max-width: 1200px; margin: 0 auto; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
    .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--t2); margin-bottom: 16px; }

    .drop-zone {
      border: 2px dashed var(--border); border-radius: 12px; padding: 32px 20px;
      text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
      margin-bottom: 16px;
    }
    .drop-zone:hover, .drop-zone.drag { border-color: var(--a); background: var(--a-dim); }
    .drop-zone .icon { font-size: 36px; margin-bottom: 10px; }
    .drop-zone p { color: var(--t2); font-size: 12px; }
    .drop-zone strong { color: var(--a); }
    #fileInput { display: none; }

    .preview-wrap { position: relative; margin-bottom: 16px; display: none; }
    .preview-wrap img { width: 100%; border-radius: 10px; border: 1px solid var(--border); max-height: 260px; object-fit: contain; background: #0a0a0f; }
    .preview-wrap .remove { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.7); border: none; color: white; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }

    label { display: block; font-size: 11px; font-weight: 600; color: var(--t2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
    textarea, input[type=text] {
      width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--border);
      color: var(--t1); border-radius: 9px; padding: 10px 12px; font-size: 13px;
      outline: none; resize: vertical; font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    textarea:focus, input:focus { border-color: var(--a-border); box-shadow: 0 0 0 3px var(--a-dim); }
    textarea { min-height: 80px; margin-bottom: 14px; }

    .btn {
      width: 100%; padding: 13px; font-size: 13px; font-weight: 700; cursor: pointer;
      border-radius: 10px; border: 1px solid var(--a-border);
      background: var(--a-dim); color: var(--a);
      transition: background .18s, box-shadow .18s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover:not(:disabled) { background: rgba(59,130,246,.18); box-shadow: 0 0 20px rgba(59,130,246,.2); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .result-area { height: calc(100vh - 140px); display: flex; flex-direction: column; }
    .result-area .card { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #result {
      flex: 1; overflow-y: auto; font-size: 13px; line-height: 1.8;
      color: var(--t1); white-space: pre-wrap; padding: 4px 0;
    }
    #result.empty { color: var(--t2); display: flex; align-items: center; justify-content: center; text-align: center; }

    .status { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; }
    .status.loading { background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2); color: var(--a); }
    .status.success { background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2); color: var(--green); }
    .status.error   { background: rgba(239,68,68,.08);  border: 1px solid rgba(239,68,68,.2);  color: var(--red); }

    .spinner { width: 14px; height: 14px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tab-row { display: flex; gap: 4px; margin-bottom: 16px; background: rgba(255,255,255,.04); border-radius: 9px; padding: 3px; }
    .tab { flex: 1; padding: 7px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; background: transparent; color: var(--t2); transition: .15s; }
    .tab.active { background: var(--card); color: var(--a); box-shadow: 0 2px 6px rgba(0,0,0,.3); }

    @media (max-width: 768px) { .shell { grid-template-columns: 1fr; } .result-area { height: auto; } }
  </style>
</head>
<body>

<div class="header">
  <span class="logo">⚡</span>
  <h1>Agent Génie Électrique</h1>
  <span class="badge">Qwen 2.5 VL · 72B</span>
</div>

<div class="shell">

  <!-- Panneau gauche : upload + prompt -->
  <div>
    <div class="card">
      <div class="card-title">Schéma ou plan électrique</div>

      <div class="tab-row">
        <button class="tab active" onclick="switchTab('upload')">📁 Fichier</button>
        <button class="tab"        onclick="switchTab('url')">🔗 URL</button>
      </div>

      <!-- Upload -->
      <div id="panel-upload">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()"
             ondragover="onDrag(event,true)" ondragleave="onDrag(event,false)" ondrop="onDrop(event)">
          <div class="icon">📐</div>
          <p><strong>Cliquez</strong> ou déposez un fichier ici</p>
          <p style="margin-top:6px;font-size:11px;">PNG · JPG · WEBP</p>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="onFileChange(this)">
        <div class="preview-wrap" id="previewWrap">
          <img id="previewImg" src="" alt="aperçu">
          <button class="remove" onclick="removeFile()">✕</button>
        </div>
      </div>

      <!-- URL -->
      <div id="panel-url" style="display:none;margin-bottom:16px;">
        <label>URL de l'image</label>
        <input type="text" id="imageUrl" placeholder="https://exemple.com/schema.png">
      </div>

      <label>Question / instruction</label>
      <textarea id="prompt" placeholder="Décris tous les composants de ce schéma électrique, identifie les protections, les câblages et tout problème potentiel.">Analyse ce schéma électrique en détail. Identifie tous les composants, les protections, les connexions, les niveaux de tension et tout problème ou non-conformité éventuel.</textarea>

      <button class="btn" id="analyzeBtn" onclick="analyze()">
        <span>⚡</span> Analyser le schéma
      </button>
    </div>

    <!-- Exemples de prompts -->
    <div class="card" style="margin-top:12px;">
      <div class="card-title">Prompts suggérés</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="prompt-chip" onclick="setPrompt(this)">Identifie tous les composants et leur rôle</button>
        <button class="prompt-chip" onclick="setPrompt(this)">Y a-t-il des non-conformités aux normes NF C 15-100 ?</button>
        <button class="prompt-chip" onclick="setPrompt(this)">Calcule la section de câble nécessaire pour ce circuit</button>
        <button class="prompt-chip" onclick="setPrompt(this)">Décris le cheminement des câbles et les protections</button>
        <button class="prompt-chip" onclick="setPrompt(this)">Identifie les équipotentielles et les mises à la terre</button>
      </div>
    </div>
  </div>

  <!-- Panneau droit : résultat -->
  <div class="result-area">
    <div class="card">
      <div class="card-title">Analyse IA</div>
      <div id="statusBar" style="display:none;"></div>
      <div id="result" class="empty">
        ⚡ Chargez un schéma électrique et cliquez sur "Analyser"
      </div>
    </div>
  </div>

</div>

<style>
  .prompt-chip {
    background: rgba(255,255,255,.03); border: 1px solid var(--border); color: var(--t2);
    padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 11px; text-align: left;
    transition: background .15s, color .15s, border-color .15s;
  }
  .prompt-chip:hover { background: var(--a-dim); color: var(--a); border-color: var(--a-border); }
</style>

<script>
  let currentTab = 'upload';
  let selectedFile = null;

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='upload')||(i===1&&tab==='url')));
    document.getElementById('panel-upload').style.display = tab === 'upload' ? '' : 'none';
    document.getElementById('panel-url').style.display    = tab === 'url'    ? '' : 'none';
  }

  function onDrag(e, active) { e.preventDefault(); document.getElementById('dropZone').classList.toggle('drag', active); }
  function onDrop(e) { e.preventDefault(); onDrag(e, false); const f = e.dataTransfer.files[0]; if (f) loadFile(f); }
  function onFileChange(input) { if (input.files[0]) loadFile(input.files[0]); }

  function loadFile(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('previewWrap').style.display = 'block';
      document.getElementById('dropZone').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function removeFile() {
    selectedFile = null;
    document.getElementById('previewWrap').style.display = 'none';
    document.getElementById('dropZone').style.display = 'block';
    document.getElementById('fileInput').value = '';
  }

  function setPrompt(btn) { document.getElementById('prompt').value = btn.textContent; }

  function setStatus(type, msg) {
    const bar = document.getElementById('statusBar');
    bar.style.display = 'flex';
    bar.className = `status ${type}`;
    bar.innerHTML = type === 'loading'
      ? `<div class="spinner"></div><span>${msg}</span>`
      : `<span>${type === 'success' ? '✓' : '✗'}</span><span>${msg}</span>`;
  }

  async function analyze() {
    const prompt  = document.getElementById('prompt').value.trim() || 'Analyse ce schéma électrique.';
    const resultEl = document.getElementById('result');
    const btn      = document.getElementById('analyzeBtn');

    btn.disabled = true;
    resultEl.classList.remove('empty');
    resultEl.textContent = '';
    setStatus('loading', 'Analyse en cours avec Qwen 2.5 VL 72B…');

    try {
      let resp;
      if (currentTab === 'upload') {
        if (!selectedFile) throw new Error('Veuillez sélectionner un fichier image.');
        const fd = new FormData();
        fd.append('file',   selectedFile);
        fd.append('prompt', prompt);
        resp = await fetch('/analyze', { method: 'POST', body: fd });
      } else {
        const url = document.getElementById('imageUrl').value.trim();
        if (!url) throw new Error('Veuillez entrer une URL d\'image.');
        const fd = new FormData();
        fd.append('image_url', url);
        fd.append('prompt',    prompt);
        resp = await fetch('/analyze-url', { method: 'POST', body: fd });
      }

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || 'Erreur serveur');
      }

      const data = await resp.json();
      resultEl.textContent = data.analysis;
      setStatus('success', `Analyse complète · ${data.model}`);
    } catch (err) {
      resultEl.classList.add('empty');
      resultEl.textContent = '✗ ' + err.message;
      setStatus('error', err.message);
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
